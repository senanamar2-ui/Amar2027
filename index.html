<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض المهندس عمار سنان</title>
    <style>
        /* CSS المحدث */
        body {
            margin: 0; padding: 0;
            background-image: url('amr.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .marquee-box {
            width: 85%; max-width: 400px; margin-top: 50px; padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #ffd700; border-radius: 20px;
            color: #ffffff; font-weight: bold; text-align: center;
            backdrop-filter: blur(10px);
        }
        .btn-container {
            margin-top: 40px; width: 85%; max-width: 400px; 
            display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px;
        }
        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #ffffff; text-decoration: none; padding: 18px;
            text-align: center; border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.5);
            font-weight: bold; transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700; transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="marquee-box">
        <marquee direction="right" scrollamount="5">أهلاً بكم في الموقع الرئيسي للمهندس عمار سنان</marquee>
    </div>

    <div class="btn-container" id="links-container">
        <!-- الأزرار هنا -->
        <a href="https://v0-luxury-3d-media-studio.vercel.app/" class="btn">Luxury 3D Media Studio</a>
        <a href="https://v0-image-viewer-website-inky.vercel.app/" class="btn">Image Viewer Website</a>
        <a href="https://abcb-six.vercel.app/" class="btn">معرض الصور</a>
        <a href="https://my-linksf-ofpd.vercel.app/" class="btn">المنصة الكروية</a>
    </div>

    <script>
        // JS لإضافة تأثير عند فتح الصفحة
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                console.log("جاري التوجيه إلى: " + e.target.innerText);
            });
        });
        
        console.log("تم تحميل الصفحة بنجاح يا عمار!");
    </script>

</body>
</html>
